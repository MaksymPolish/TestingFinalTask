name: CI/CD Orchestrator

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# This workflow serves as a status aggregator.
# Individual workflows are triggered via their own trigger conditions:
# - unit-tests.yml: Runs on all pushes and PRs
# - integration-tests.yml: Runs on all pushes and PRs
# - database-tests.yml: Runs on all pushes and PRs
# - performance-tests.yml: Runs only on main branch pushes

jobs:
  status-check:
    runs-on: ubuntu-latest
    steps:
    - name: CI/CD Pipeline Status
      run: |
        echo "## CI/CD Pipeline"
        echo ""
        echo "✓ Unit Tests workflow triggered"
        echo "✓ Integration Tests workflow triggered"
        echo "✓ Database Tests workflow triggered"
        echo "✓ Performance Tests workflow triggered (main branch only)"
        echo ""
        echo "View individual workflow runs in the Actions tab."
