name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Run Unit Tests
      run: dotnet test DonationPlatform.Tests/DonationPlatform.Tests.csproj --configuration Release --no-build --verbosity detailed --logger "console;verbosity=detailed" --logger "trx;LogFileName=unit-test-results.trx" --collect:"XPlat Code Coverage" --filter "FullyQualifiedName~DonationPlatform.Tests.Unit"
    
    - name: Upload Unit Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: unit-test-results
        path: '**/unit-test-results.trx'
    
    - name: Unit Tests Code Coverage
      uses: codecov/codecov-action@v4
      with:
        flags: unit
        name: unit-tests-coverage

  integration-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: DonationPlatform
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Run Integration Tests
      run: dotnet test DonationPlatform.Tests/DonationPlatform.Tests.csproj --configuration Release --no-build --verbosity detailed --logger "console;verbosity=detailed" --logger "trx;LogFileName=integration-test-results.trx" --collect:"XPlat Code Coverage" --filter "FullyQualifiedName~DonationPlatform.Tests.Integration"
      env:
        ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=DonationPlatform;Username=postgres;Password=postgres"
    
    - name: Upload Integration Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: integration-test-results
        path: '**/integration-test-results.trx'
    
    - name: Integration Tests Code Coverage
      uses: codecov/codecov-action@v4
      with:
        flags: integration
        name: integration-tests-coverage

  database-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Run Database Tests
      run: dotnet test DonationPlatform.Tests/DonationPlatform.Tests.csproj --configuration Release --no-build --verbosity detailed --logger "console;verbosity=detailed" --logger "trx;LogFileName=database-test-results.trx" --collect:"XPlat Code Coverage" --filter "FullyQualifiedName~DonationPlatform.Tests.Database"
    
    - name: Upload Database Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: database-test-results
        path: '**/database-test-results.trx'
    
    - name: Database Tests Code Coverage
      uses: codecov/codecov-action@v4
      with:
        flags: database
        name: database-tests-coverage
