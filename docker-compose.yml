version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: donation-platform-db
    environment:
      POSTGRES_DB: DonationPlatform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - donation-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: donation-platform-api
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=DonationPlatform;Username=postgres;Password=postgres"
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - donation-network

volumes:
  postgres_data:
    driver: local

networks:
  donation-network:
    driver: bridge
