# K6 Performance Testing Configuration
# This file contains common configurations for k6 test execution

environments:
  local:
    baseUrl: "http://localhost:5000"
    
  staging:
    baseUrl: "http://staging-api.example.com"
    
  production:
    baseUrl: "http://api.example.com"

tests:
  smoke:
    vus: 5
    duration: "20s"
    thresholds:
      http_req_duration: ["p(99)<1500ms"]
      http_req_failed: ["rate<0.1"]
  
  load:
    stages:
      - duration: "30s"
        target: 5
      - duration: "1m30s"
        target: 50
      - duration: "20m"
        target: 100
      - duration: "30s"
        target: 0
    thresholds:
      http_req_duration: ["p(95)<500ms", "p(99)<1500ms"]
      http_req_failed: ["rate<0.1"]
  
  stress:
    stages:
      - duration: "30s"
        target: 100
      - duration: "2m"
        target: 500
      - duration: "30s"
        target: 0
    thresholds:
      http_req_duration: ["p(95)<800ms"]
      http_req_failed: ["rate<0.5"]
  
  journey:
    vus: 50
    duration: "5m"
    thresholds:
      http_req_duration: ["p(95)<600ms"]
      http_req_failed: ["rate<0.05"]

# Metrics collection
metrics:
  collect:
    - name: "http_reqs"
      type: "counter"
    - name: "http_req_duration"
      type: "trend"
    - name: "http_req_failed"
      type: "rate"
    - name: "checks"
      type: "rate"

# Output options
output:
  formats:
    - csv
    - json
  
  csv:
    filename: "results.csv"
  
  json:
    filename: "results.json"
    open: false
